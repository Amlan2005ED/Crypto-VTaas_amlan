[package]
name    = "vtaas-backend"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "vtaas-server"
path = "src/main.rs"

[dependencies]
actix-web       = "4"
actix-cors      = "0.7"
serde           = { version = "1", features = ["derive"] }
serde_json      = "1"
sha2            = "0.10"
hmac            = "0.12"
hex             = "0.4"
aes-gcm         = "0.10"
rand            = "0.8"
tokio           = { version = "1", features = ["full"] }
chrono          = { version = "0.4", features = ["serde"] }
